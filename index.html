<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>社交天平 (Social Balance) - 开源版</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function App() {
            const [data, setData] = useState(null);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState(null);
            const [stats, setStats] = useState(null);
            const [sessions, setSessions] = useState([]);
            const [activeView, setActiveView] = useState(null);

            const GAP_SECONDS = 4 * 3600; 

            const handleDeleteSession = (sessionId) => {
                const newSessions = sessions.filter(s => s.id !== sessionId);
                let totalMy = 0, totalHer = 0;
                newSessions.forEach(s => { if (s.initiator === 'me') totalMy++; else totalHer++; });
                const safeRatio = (a, b) => ((a + b) === 0 ? 0 : (a / (a + b) * 100)).toFixed(1);
                setStats(prev => ({ ...prev, myInitiations: totalMy, herInitiations: totalHer, initiationRatio: safeRatio(totalMy, totalHer) }));
                setSessions(newSessions);
            };

            const handleFileUpload = (event) => {
                const file = event.target.files[0];
                if (!file) return;
                setLoading(true); setError(null);
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const json = JSON.parse(e.target.result);
                        analyzeData(json);
                    } catch (err) { setError("解析失败：" + err.message); setLoading(false); }
                };
                reader.readAsText(file);
            };

            const analyzeData = (json) => {
                const ownerId = json.session.ownerId;
                const messages = json.messages;
                let parsedSessions = [], currentSession = null, totalMy = 0, totalHer = 0, counter = 0;

                messages.forEach((msg) => {
                    let isMe = msg.hasOwnProperty('isSend') ? (msg.isSend === 1 || msg.isSend === true) : (msg.sender === ownerId);
                    if (!msg.createTime) return;
                    let text = msg.content || msg.msgContent || msg.msg || "";
                    
                    if (!currentSession || (msg.createTime - currentSession.lastMsgTime > GAP_SECONDS)) {
                        if (currentSession) parsedSessions.push(currentSession);
                        if (isMe) totalMy++; else totalHer++;
                        counter++;
                        currentSession = { id: `s_${counter}_${msg.createTime}`, startTime: msg.createTime, lastMsgTime: msg.createTime, initiator: isMe ? 'me' : 'her', msgCount: 1, topicPreview: text || '[非文本消息]' };
                    } else {
                        currentSession.lastMsgTime = msg.createTime;
                        currentSession.msgCount++;
                        if (currentSession.topicPreview === '[非文本消息]' && text) currentSession.topicPreview = text;
                    }
                });
                if (currentSession) parsedSessions.push(currentSession);
                const ratio = ((totalMy / (totalMy + totalHer)) * 100).toFixed(1);
                setStats({ myInitiations: totalMy, herInitiations: totalHer, initiationRatio: ratio });
                setSessions(parsedSessions.reverse());
                setData(json); setLoading(false);
            };

            const formatDate = (t) => new Date(t * 1000).toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
            const filteredSessions = sessions.filter(s => s.initiator === activeView);

            return (
                <div className="max-w-6xl mx-auto p-4 md:p-8 space-y-8">
                    <div className="bg-white rounded-3xl shadow-sm p-8 text-center border border-slate-100">
                        <h1 className="text-3xl font-extrabold text-slate-900 mb-3">社交天平 (Social Balance)</h1>
                        <p className="text-slate-500 mb-8">开源情感分析工具：谁在努力维系话题？</p>
                        {!data && (
                            <div className="flex flex-col items-center justify-center p-12 border-2 border-dashed border-slate-200 rounded-2xl bg-slate-50 hover:bg-slate-100 transition-colors relative">
                                <input type="file" accept=".json" onChange={handleFileUpload} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" />
                                <div className="text-blue-600 font-semibold">点击或拖入 JSON 文件</div>
                            </div>
                        )}
                        {loading && <p className="text-blue-600 animate-pulse mt-4">计算中...</p>}
                        {error && <p className="text-red-500 mt-4">{error}</p>}
                    </div>

                    {stats && (
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div onClick={() => setActiveView('me')} className={`cursor-pointer rounded-3xl p-6 border-2 transition-all ${activeView === 'me' ? 'bg-blue-50 border-blue-500' : 'bg-white border-transparent shadow-sm'}`}>
                                <h2 className="text-xl font-bold text-blue-600">我主动发起: {stats.myInitiations}次</h2>
                                <div className="text-sm text-slate-500 mt-2">占比 {stats.initiationRatio}%</div>
                            </div>
                            <div onClick={() => setActiveView('her')} className={`cursor-pointer rounded-3xl p-6 border-2 transition-all ${activeView === 'her' ? 'bg-rose-50 border-rose-500' : 'bg-white border-transparent shadow-sm'}`}>
                                <h2 className="text-xl font-bold text-rose-600">对方主动发起: {stats.herInitiations}次</h2>
                                <div className="text-sm text-slate-500 mt-2">占比 {(100 - stats.initiationRatio).toFixed(1)}%</div>
                            </div>
                        </div>
                    )}

                    {activeView && (
                        <div className="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden">
                            <div className="p-4 bg-slate-50 font-bold border-b">{activeView === 'me' ? '我发起的' : '对方发起的'}话题列表</div>
                            <div className="max-h-[500px] overflow-y-auto">
                                {filteredSessions.map(s => (
                                    <div key={s.id} className="p-4 border-b hover:bg-slate-50 flex justify-between group">
                                        <div className="flex-1">
                                            <div className="text-xs text-slate-400">{formatDate(s.startTime)}</div>
                                            <div className="text-slate-700 mt-1">{s.topicPreview}</div>
                                        </div>
                                        <button onClick={() => handleDeleteSession(s.id)} className="text-slate-300 hover:text-red-500 ml-4 opacity-0 group-hover:opacity-100">删除</button>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
